<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q.C Software - Ocorrências</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-body-tertiary text-body">

    <div class="d-flex">
    <nav class="sidebar d-flex flex-column flex-shrink-0 position-fixed">
        <button class="toggle-btn" onclick="toggleSidebar()">
            <i class="fas fa-chevron-left"></i>
        </button>

        <div class="logo">
            <img src="/telas/imagens/logo.png" alt="Logo">            
        </div>

        <div class="nav flex-column">                 
            <a href="/telas/produtos.html" class="sidebar-link text-decoration-none p-3">
                <i class="sidebar-texto fas fa-box me-3"></i>
                <span class="sidebar-texto">Produtos</span>
            </a> 
            
             <a href="/telas/maquinas.html" class="sidebar-link text-decoration-none p-3">
                <i class="sidebar-texto fas fa-industry me-2"></i>
                <span class="sidebar-texto">Máquinas</span>
            </a>  

             <a href="/telas/cargos.html" class="sidebar-link text-decoration-none p-3">
                <i class="sidebar-texto fa fa-address-card me-2"></i>
                <span class="sidebar-texto">Cargos</span>
            </a>

            <a href="/telas/colaboradores.html" class="sidebar-link text-decoration-none p-3">
                <i class="sidebar-texto fa fa-user me-2"></i>
                <span class="sidebar-texto">Colaboradores</span>
            </a>

            <a href="/telas/ocorrencias.html" class="sidebar-link text-decoration-none p-3">
                <i class="sidebar-texto fa-solid fa-triangle-exclamation me-2"></i>
                <span class="sidebar-texto">Ocorrências</span>
            </a>

            <div class="profile-section p-4 mt-auto">

                <div class="d-flex align-items-center">
    
                    <div class="ms-3 profile-info">
    
                        <h5 class="text-white mb-1">
                            <i class="fa fa-user-circle"></i>
                            <span id="usuario-nome">Colaborador Q.C Software</span>
                        </h5>
    
                        <h6 class="text-black mb-1">
                            <i class="fa fa-address-card"></i>
                            <span id="usuario-cargo">Líder de Produção</span>
                        </h6>
    
                        <h6 class="text-black mb-1">
                            <i class="fa fa-calendar"></i>
                            <span id="data-brasilia">--/--/----</span>
                        </h6>
    
                        <h6 class="text-black mb-0">
                            <i class="fa fa-clock"></i>
                            <span id="hora-brasilia">--:--</span> horas
                        </h6>                
            </div>
        </div>
    </nav>

    <main class="main-content">
    <div class="container-fluid mb-4">
        <i class="sidebar-texto2 fa-solid fa-triangle-exclamation me-3 fw-bold"></i>
        <span class="sidebar-texto2 fw-bold">Ocorrências</span>
    </div>

    <section class="mb-4">            
        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm p-4 border-0 bg-body">
                    
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="mb-0 fw-bold text-body" id="titulo-form-colab">
                            <i class="sidebar-texto fa-solid fa-triangle-exclamation me-3"></i> Nova Ocorrência
                        </h4>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" form="formOcorrencias" class="btn btn-success px-4 fw-bold">
                                <i class="bi bi-floppy"></i> Salvar
                            </button>
                        </div>
                    </div>
                    
                    <form id="formOcorrencias" class="row g-3 align-items-end">
                        <input type="hidden" id="ocorrencias-id">
                        
                        <div class="col-md-4">
                            <label class="form-label fw-semibold text-body">Número da Ocorrência</label>
                            <input type="number" id="ocorrencias-numero" class="form-control bg-body text-body shadow-none" required placeholder="Digite o número da ocorrência...">
                        </div>  
                        
                        <div class="col-md-4">
                            <label class="form-label fw-semibold text-body">Data da Ocorrência</label>
                            <input type="datetime-local" id="ocorrencias-data" class="form-control bg-body text-body shadow-none" placeholder="Digite...">
                        </div>
        
                        <div class="col-md-4">
                            <label class="form-label fw-semibold text-body">Máquina</label>
                            <select class="form-select bg-body text-body shadow-none" id="ocorencias-máquinas">
                                <option value="">Selecione a máquina...</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-semibold text-body">Colaborador</label>
                            <select class="form-select bg-body text-body shadow-none" id="ocorrências-colaborador">
                                <option value="">Selecione o colaborador...</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-semibold text-body">Produto</label>
                            <select class="form-select bg-body text-body shadow-none" id="ocorrências-produto">
                                <option value="">Selecione o produto...</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-semibold text-body">Lote do Produto</label>
                            <input type="number" id="ocorrencias-lote-produto" class="form-control bg-body text-body shadow-none" placeholder="Digite o lote do produto...">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-semibold text-body">Número da Nota Fiscal</label>
                            <input type="number" id="ocorrencias-numero-nota" class="form-control bg-body text-body shadow-none" placeholder="Digite o número da nota fiscal...">
                        </div>

                        <h4 class="mb-0 fw-bold text-body" id="titulo-form-descricao">
                            <i class="sidebar-texto fa-solid fa-file-circle-exclamation me-3"></i> Descrição do Problema e Falhas
                        </h4>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-body">Descrição do Problema</label>
                            <input type="text" id="ocorrencias-problema" class="form-control bg-body text-body shadow-none" style="height: 60px; resize: vertical; padding-top: 4px; line-height: 1;padding-bottom: 20px;" required placeholder="Digite a descrição do problema...">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-body">Como ocorreu a falha?</label>
                            <input type="text" id="ocorrencias-falha-como" class="form-control bg-body text-body shadow-none" style="height: 60px; resize: vertical;padding-top: 4px; line-height: 1;padding-bottom: 20px;" required placeholder="Digite como ocorreu a falha...">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-body">Quando ocorreu a falha?</label>
                            <input type="text" id="ocorrencias-falha-quando" class="form-control bg-body text-body shadow-none" style="height: 60px; resize: vertical;padding-top: 4px; line-height: 1;padding-bottom: 20px;" required placeholder="Digite quando ocorreu a falha...">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-body">Quem estava envolvido na falha?</label>
                            <input type="text" id="ocorrencias-falha-quem" class="form-control bg-body text-body shadow-none" style="height: 60px; resize: vertical;padding-top: 4px; line-height: 1;padding-bottom: 20px;" required placeholder="Digite quem estava envolvido na falha...">
                        </div>

                        <h4 class="mb-0 fw-bold text-body" id="titulo-form-ocorrencias">
                            <i class="sidebar-texto fa-solid fa-screwdriver-wrench me-3"></i> Ação e Situação
                        </h4>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold text-body">Observações Adicionais</label>
                            <input type="text" id="ocorrencias-observacoes-adicionais" class="form-control bg-body text-body shadow-none" style="height: 60px; resize: vertical;padding-top: 4px; line-height: 1;padding-bottom: 20px;" required placeholder="Digite observações adiconais...">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold text-body">Ações Corretivas</label>
                            <input type="text" id="ocorrencias-observacoes" class="form-control bg-body text-body shadow-none" style="height: 60px; resize: vertical;padding-top: 4px; line-height: 1;padding-bottom: 20px;" required placeholder="Digite ...">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold text-body">Data Prazo</label>
                            <input type="date" id="ocorrencias-data-prazo" class="form-control bg-body text-body shadow-none" required placeholder="Digite ...">
                        </div>

                        <div class="col-md-6">
                            <label for="ocorrencia-situacao" class="form-label fw-semibold text-body">Situação</label>
                            <select id="ocorrencia-situacao" class="form-select">
                                <option value>Pendente</option>
                                <option value>Em andamento</option>
                                <option value>Em análise</option>
                                <option value>Concluido</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <i class="sidebar-texto fa-solid fa-camera me-3"></i>
                            <label class="form-label fw-semibold text-body">Foto da Ocorrência</label>
                            <input type="file" id="ocorrencias-foto-ocorrencia" class="form-control bg-body text-body shadow-none" accept="imagens/*">
                        </div>

                    </form>
                    
                </div>
            </div>
        </div>
    </section>

</main>

<!-- CONTENEUR PARA TOASTS DE NOTIFICAÇÃO (OPCIONAL - USADO PELO SEU SCRIPT) -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast-cadastro" class="toast align-items-center text-white border-0 shadow" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body d-flex align-items-center gap-2">
                <span id="toast-mensagem-icone"></span>
                <span id="toast-mensagem-texto"></span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

    <script>
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('collapsed');
        }        
    </script>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/telas/ocorrencias.js"></script>
</body>
</html>
