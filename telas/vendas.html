<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Vendas - Restaurante do Fabricio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-body-tertiary text-body">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
                <i class="bi bi-shop me-2 text-warning"></i>
                <span>Restaurante do Fabricio</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link px-3" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="produtos.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link px-3 active me-3" href="vendas.html">PDV</a></li>
                    
                    <li class="nav-item d-flex align-items-center border-start ps-lg-3 mt-3 mt-lg-0">
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox" id="darkModeSwitch" style="cursor: pointer;">
                        </div>
                        <i id="label-tema" class="bi ms-2" style="font-size: 1.1rem;"></i>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row mb-4">
            <div class="col-md-7">
                <div class="card p-4 border-0 shadow-sm h-100 bg-body">
                    <h5 class="mb-3 text-primary fw-bold">
                        <i class="bi bi-person-check me-2"></i>1. Selecione o Cliente
                    </h5>
                    <select id="select-cliente" class="form-select form-select-lg border-primary shadow-none bg-body text-body">
                        <option value="">Aguardando carregamento...</option>
                    </select>
                </div>
            </div>

            <div class="col-md-5 mt-4 mt-md-0">
                <div class="card border-primary shadow-sm h-100 overflow-hidden bg-body">
                    <div class="card-header bg-primary text-white fw-bold py-3">
                        <i class="bi bi-cart3 me-2"></i>Carrinho de Pedidos
                    </div>
                    <div id="itens-carrinho" class="card-body p-3" style="max-height: 250px; overflow-y: auto;">
                        <p class="text-muted small text-center py-3">Nenhum item adicionado...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-3 align-items-center">
            <div class="col-md-6">
                <h5 class="fw-bold text-secondary mb-0">
                    <i class="bi bi-grid-3x3-gap me-2"></i>2. Escolha os Produtos
                </h5>
            </div>
            <div class="col-md-6 mt-2 mt-md-0">
                <div class="input-group">
                    <span class="input-group-text bg-body border-end-0 text-body"><i class="bi bi-search"></i></span>
                    <input type="text" id="busca-produto" class="form-control border-start-0 shadow-none bg-body text-body" placeholder="Procurar um produto no cardápio...">
                </div>
            </div>
        </div>

        <div class="row g-3 mb-5" id="lista-produtos">
            <div class="text-center p-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Buscando cardápio...</p>
            </div>
        </div>

        <hr class="my-5 opacity-25">

        <div class="row">
            <div class="col-12">
                <div class="card border-0 shadow-sm overflow-hidden bg-body">
                    <div class="card-header bg-body py-3 d-flex justify-content-between align-items-center border-bottom">
                        <h5 class="mb-0 fw-bold d-flex align-items-center">
                            <i class="bi bi-clock-history me-2"></i>Histórico Recente 
                            <span id="total-vendas-badge" class="badge bg-primary rounded-pill ms-2" style="font-size: 0.8rem;">0</span>
                        </h5>
                        <button onclick="gerarRelatorioPDF()" class="btn btn-danger btn-sm px-3 fw-bold shadow-sm">
                            <i class="bi bi-file-earmark-pdf me-1"></i>Exportar PDF
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th class="ps-3">ID</th>
                                    <th>Cliente</th>
                                    <th>Produto</th>
                                    <th>Total</th>
                                    <th>Data</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-vendas" class="table-group-divider">
                                <tr>
                                    <td colspan="5" class="text-center py-4 text-muted">Carregando histórico...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
