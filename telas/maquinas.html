<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q.C Software - Máquinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-body-tertiary text-body">

    <div class="d-flex">
        <nav class="sidebar d-flex flex-column flex-shrink-0 position-fixed">
            <button class="toggle-btn" onclick="toggleSidebar()">
                <i class="fas fa-chevron-left"></i>
            </button>

            <div class="logo">
                <img src="/telas/imagens/logo.png" alt="Logo">            
            </div>

            <div class="nav flex-column">
                <a href="/telas/produtos.html" class="sidebar-link text-decoration-none p-3">
                    <i class="sidebar-texto fas fa-box me-3"></i>
                    <span class="sidebar-texto">Produtos</span>
                </a> 
                
                <a href="/telas/maquinas.html" class="sidebar-link text-decoration-none p-3">
                    <i class="sidebar-texto fas fa-industry me-2"></i>
                    <span class="sidebar-texto">Máquinas</span>
                </a>  

                <a href="/telas/cargos.html" class="sidebar-link text-decoration-none p-3">
                    <i class="sidebar-texto fa fa-address-card me-2"></i>
                    <span class="sidebar-texto">Cargos</span>
                </a> 

                <a href="/telas/colaboradores.html" class="sidebar-link text-decoration-none p-3">
                    <i class="sidebar-texto fa fa-user me-2"></i>
                    <span class="sidebar-texto">Colaboradores</span>
                </a>
            </div>

            <div class="profile-section p-4 mt-auto">
                <div class="d-flex align-items-center">            
                    <div class="ms-3 profile-info">
                        <h5 class="text-white mb-1"> <i class="fa fa-user-circle"></i> <span id="usuario-nome">Colaborador Q.C Software</span></h5>
                        <h6 class="text-black mb-1"> <i class="fa fa-address-card"></i> <span id="usuario-cargo">Líder de Produção</span></h6>
                        <h6 class="text-black mb-1"><i class="fa fa-calendar"></i> <span id="data-brasilia"> --/--/----</span></h6>
                        <h6 class="text-black mb-0"> <i class="fa fa-clock"></i> <span id="hora-brasilia"> --:--</span> horas</h6>                
                    </div>
                </div>
            </div>
        </nav>

        <main class="main-content" style="margin-left: 260px; width: 100%;">
            <div class="container-fluid mb-4 mt-3">
                <i class="sidebar-texto2 fas fa-industry me-3 fw-bold"></i>
                <span class="sidebar-texto2 fw-bold">Máquinas</span>
            </div>

            <!-- SEÇÃO DO FORMULÁRIO (CREATE / UPDATE) -->
            <section class="mb-4">            
                <div class="col-12">
                    <div class="card shadow-sm p-4 border-0 bg-body">
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h4 class="mb-0 fw-bold text-body" id="titulo-form-maq">
                                <i class="sidebar-texto fas fa-industry me-3"></i> Nova Máquina
                            </h4>
                            
                            <div class="d-flex gap-2">
                                <button type="submit" form="formMaquinas" class="btn btn-success px-4 fw-bold">
                                    💾 Salvar
                                </button>
                            </div>
                        </div>
                        
                        <form id="formMaquinas" class="row g-3 align-items-end">
                            <input type="hidden" id="maq-id">
                            
                            <div class="col-md-4">
                                <label class="form-label fw-semibold text-body">Nome</label>
                                <input type="text" id="maquinas-nome" class="form-control bg-body text-body shadow-none" required placeholder="Digite o nome da máquina...">
                            </div>             
                                                        
                            <div class="col-md-4">
                                <label class="form-label fw-semibold text-body">Situação</label>
                                <select class="form-select bg-body text-body shadow-none" id="maquinas-situacao">
                                    <option value="Ativo">Ativo</option>
                                    <option value="Inativo">Inativo</option>
                                </select>
                            </div>
                        </form>
                        
                    </div>
                </div>
            </section>

            <!-- SEÇÃO DA TABELA (READ / SEARCH / PAGINATION) -->
            <section class="mt-4">
                <div class="row align-items-center mb-4">
                    <div class="col-12 col-md-auto">
                        <h3 class="text-white mb-0 fw-bold d-inline-block align-middle me-2">Máquinas Cadastradas</h3>
                        <span class="badge bg-light text-dark fw-bold px-3 py-2 fs-6 align-middle" id="total-maquinas">$</span>
                    </div>
                
                    <div class="col-12 col-md-5 ms-auto mt-3 mt-md-0">
                        <div class="position-relative style-busca style-busca-maquina shadow-sm rounded">
                            <input type="text" id="pesquisa-maquina" class="form-control w-100 ps-5 shadow-none border-0 bg-body text-body" placeholder="Buscar máquinas por nome...">
                            <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                        </div>
                    </div>
                </div>
                
                <div class="tabela-container card border-0 p-3 shadow-sm bg-body">
                    <div class="table-responsive">
                        <table class="tabela table table-hover align-middle mb-0 text-body">
                            <thead class="table-light fw-bold">
                                <tr>                                
                                    <th>Nome</th>
                                    <th>Situação</th>                                
                                    <th class="text-end">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-maquinas">
                                <tr id="loading-row">
                                    <td colspan="4" class="text-center py-4 text-muted">
                                        ⌛ Carregando máquinas...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mt-3 pt-2 border-top">
                        <button id="btn-anterior-maquinas" class="btn btn-sm btn-outline-secondary rounded shadow-none" disabled>
                            <i class="bi bi-chevron-left"></i> Anterior
                        </button>
                    
                        <span id="info-paginacao-maquinas" class="small text-muted">Página 1 de 1</span>
                    
                        <button id="btn-proximo-maquinas" class="btn btn-sm btn-outline-secondary rounded shadow-none" disabled>
                            Próximo <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- RECIPIENTE PARA TOASTS DE NOTIFICAÇÃO (OPCIONAL) -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast-cadastro" class="toast align-items-center text-white border-0 shadow" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2">
                    <span id="toast-mensagem-icone"></span>
                    <span id="toast-mensagem-texto"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('collapsed');
        }        
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/telas/script.js"></script>
</body>
</html>
