<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Restaurante do Fabricio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-body-tertiary text-body">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
                <i class="bi bi-shop me-2 text-warning"></i>
                <span>Restaurante do Fabricio</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link px-3" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link px-3 active" href="clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="produtos.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link px-3 me-3" href="vendas.html">PDV</a></li>
                    
                    <li class="nav-item d-flex align-items-center border-start ps-lg-3 mt-3 mt-lg-0">
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox" id="darkModeSwitch" style="cursor: pointer;">
                        </div>
                        <i id="label-tema" class="bi ms-2" style="font-size: 1.1rem; min-width: 20px;"></i>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow-sm p-4 border-0 bg-body">
                    <h4 class="mb-3 fw-bold text-body" id="titulo-form">
                        <i class="bi bi-person-plus text-primary me-2"></i>Novo Cliente
                    </h4>
                    <form id="formCliente">
                        <input type="hidden" id="cli-id">
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-body">Nome Completo</label>
                            <input type="text" id="cli-nome" class="form-control bg-body text-body shadow-none" required placeholder="Ex: João Silva">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-body">Telefone</label>
                            <input type="text" id="cli-tel" class="form-control bg-body text-body shadow-none" placeholder="(00) 00000-0000">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-body">E-mail</label>
                            <input type="email" id="cli-email" class="form-control bg-body text-body shadow-none" placeholder="joao@email.com">
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">
                            <i class="bi bi-save me-1"></i> Salvar Cliente
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0 overflow-hidden bg-body">
                    <div class="card-header bg-body py-3 d-flex justify-content-between align-items-center border-bottom">
                        <h4 class="fw-bold mb-0 text-body">
                            Lista de Clientes
                            <span id="total-clientes" class="badge bg-primary rounded-pill ms-2" style="font-size: 0.8rem;">0</span>
                        </h4>
                        <span class="badge border text-secondary opacity-75 small">
                            <i class="bi bi-cloud-check me-1"></i>Sincronizado
                        </span>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0 text-body">
                            <thead class="table-dark">
                                <tr>
                                    <th style="width: 40%;" class="ps-3">Nome</th>
                                    <th style="width: 30%;">Telefone</th>
                                    <th class="text-center" style="width: 30%;">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-clientes" class="table-group-divider">
                                <tr>
                                    <td colspan="3" class="text-center text-muted py-5">
                                        <div class="spinner-border spinner-border-sm text-primary me-2"></div>
                                        Buscando clientes na base de dados...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
